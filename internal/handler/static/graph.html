<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBank — Neural Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080d;overflow:hidden;font-family:'SF Mono','Cascadia Code','Fira Code',monospace;color:#ccc}
canvas{display:block;position:absolute;top:0;left:0}

/* Sidebar - left (data sidebar like video) */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:linear-gradient(180deg,#0c0c12 0%,#08080d 100%);border-right:1px solid #16162a;z-index:10;display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:14px 16px;border-bottom:1px solid #16162a;display:flex;align-items:center;gap:10px}
.sidebar-head h1{font-size:14px;letter-spacing:3px;color:#00ff88;text-shadow:0 0 20px #00ff8840}
.sidebar-head .pulse-ring{width:8px;height:8px;border-radius:50%;background:#00ff88;box-shadow:0 0 12px #00ff88;animation:pulse-ring 2s infinite}
@keyframes pulse-ring{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* Stats bar */
.stats-bar{display:flex;border-bottom:1px solid #16162a;padding:10px 12px;gap:6px}
.stat{flex:1;background:#ffffff04;border:1px solid #ffffff06;border-radius:5px;padding:6px 4px;text-align:center}
.stat .val{font-size:15px;font-weight:bold;color:#00ff88;text-shadow:0 0 10px #00ff8820}
.stat .lbl{font-size:8px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Data sidebar - the key section from the video */
.data-section{border-bottom:1px solid #16162a;padding:10px 0;max-height:260px;overflow-y:auto}
.data-section::-webkit-scrollbar{width:3px}.data-section::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.data-title{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:2px;padding:0 16px;margin-bottom:6px}
.data-row{display:flex;align-items:center;gap:8px;padding:4px 16px;cursor:pointer;transition:background .15s}
.data-row:hover{background:#ffffff06}
.data-row .ext{font-size:10px;color:#888;width:36px;text-align:right;font-weight:bold;flex-shrink:0}
.data-row .bar-wrap{flex:1;height:4px;background:#ffffff06;border-radius:2px;overflow:hidden}
.data-row .bar{height:100%;border-radius:2px;transition:width .6s ease}
.data-row .count{font-size:9px;color:#666;min-width:20px;text-align:right}

/* Namespace chips */
.ns-list{padding:10px 16px;border-bottom:1px solid #16162a}
.ns-list h3{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.ns-chip{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:4px;cursor:pointer;margin-bottom:3px;transition:background .2s}
.ns-chip:hover{background:#ffffff06}
.ns-chip.active{background:#00ff8812;border:1px solid #00ff8820}
.ns-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ns-name{font-size:10px;color:#aaa;flex:1}
.ns-count{font-size:9px;color:#555;background:#ffffff06;padding:1px 5px;border-radius:6px}

/* Activity feed */
.feed{flex:1;overflow:hidden;display:flex;flex-direction:column}
.feed-head{padding:10px 16px 6px;font-size:8px;color:#555;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid #16162a;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.feed-head .live{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse-ring 2s infinite}
.feed-items{flex:1;overflow-y:auto;padding:2px 0}
.feed-items::-webkit-scrollbar{width:3px}.feed-items::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.feed-item{padding:6px 14px;border-bottom:1px solid #ffffff04;font-size:10px;animation:slide-in .3s ease-out}
@keyframes slide-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.feed-item .fi-header{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.feed-item .fi-time{font-size:8px;color:#3a3a3a}
.feed-item .fi-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:bold;text-transform:uppercase}
.feed-item .fi-text{color:#888;margin-top:2px;line-height:1.3;font-size:9px}
.feed-item .fi-nodes{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.feed-item .fi-node{font-size:8px;padding:1px 5px;border-radius:3px;cursor:pointer;transition:opacity .15s}
.feed-item .fi-node:hover{opacity:.6}
.feed-item .fi-avatar{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}

/* Legend */
.legend{padding:8px 14px;border-top:1px solid #16162a;flex-shrink:0}
.legend h3{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.legend-items{display:flex;flex-wrap:wrap;gap:5px}
.legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:#666}
.legend-dot{width:5px;height:5px;border-radius:50%}

/* Top bar */
.topbar{position:fixed;left:260px;top:0;right:0;height:40px;background:#0c0c12dd;border-bottom:1px solid #16162a;z-index:10;display:flex;align-items:center;padding:0 12px;gap:6px;backdrop-filter:blur(10px)}
.topbar .sep{width:1px;height:18px;background:#1a1a1a;margin:0 3px}
.topbar button{background:#ffffff06;color:#777;border:1px solid #ffffff08;padding:4px 10px;border-radius:4px;font-family:inherit;font-size:10px;cursor:pointer;transition:all .2s}
.topbar button:hover{background:#00ff8812;color:#00ff88;border-color:#00ff8830}
.topbar button.active{background:#00ff8815;color:#00ff88;border-color:#00ff8830}
.search-wrap{position:relative;flex:1}
.search-wrap input{width:100%;background:#ffffff06;color:#ccc;border:1px solid #ffffff08;padding:4px 10px;border-radius:4px;font-family:inherit;font-size:10px;outline:none}
.search-wrap input:focus{border-color:#00ff8830;background:#ffffff0a}
.search-wrap input::placeholder{color:#3a3a3a}

/* Detail panel - right */
.panel{position:fixed;right:-380px;top:0;bottom:0;width:380px;background:linear-gradient(180deg,#0c0c12 0%,#08080d 100%);border-left:1px solid #16162a;z-index:20;transition:right .3s;overflow-y:auto;backdrop-filter:blur(15px)}
.panel.open{right:0}
.panel .x{position:absolute;top:8px;right:10px;background:none;border:none;color:#f44;font-size:16px;cursor:pointer}
.ph{padding:16px;border-bottom:1px solid #16162a}
.ph .tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:bold;margin-bottom:6px}
.ph h2{font-size:16px;color:#fff;margin-bottom:3px}
.ph .meta{color:#555;font-size:10px}
.pb{padding:16px}
.pb h3{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1px;margin:10px 0 5px}
.pb .c{color:#aaa;font-size:11px;line-height:1.5;word-break:break-word}
.pb .nb{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #ffffff06;font-size:10px;cursor:pointer;color:#777;transition:color .15s}
.pb .nb:hover{color:#00ff88}
.nb-type{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.nb-edge{font-size:8px;color:#444;min-width:70px}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#00ff8818;color:#00ff88;border:1px solid #00ff8830;padding:6px 16px;border-radius:5px;font-size:11px;z-index:30;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(10px)}
.toast.show{opacity:1}

/* Burst overlay */
.burst-canvas{position:fixed;pointer-events:none;z-index:5}

/* Recall popup */
.recall-popup{position:fixed;pointer-events:none;z-index:25;animation:recall-fade 3s forwards}
@keyframes recall-fade{0%{opacity:0;transform:translateY(10px) scale(.9)}10%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
.recall-popup .rp-card{background:#0c0c12ee;border:1px solid #00ff8830;border-radius:6px;padding:8px 12px;backdrop-filter:blur(10px);box-shadow:0 4px 20px #00000060;max-width:280px}
.recall-popup .rp-type{font-size:8px;text-transform:uppercase;font-weight:bold;margin-bottom:3px}
.recall-popup .rp-text{font-size:10px;color:#aaa;line-height:1.3}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-head">
    <div class="pulse-ring"></div>
    <h1>MINDBANK</h1>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="val" id="sn">-</div><div class="lbl">Nodes</div></div>
    <div class="stat"><div class="val" id="se">-</div><div class="lbl">Edges</div></div>
    <div class="stat"><div class="val" id="sf">-</div><div class="lbl">FPS</div></div>
    <div class="stat"><div class="val" id="sr">0</div><div class="lbl">Recalls</div></div>
  </div>
  <!-- Data sidebar — like the video's file-type list, but for node types -->
  <div class="data-section">
    <div class="data-title">Memory Types — Live Counts</div>
    <div id="dataRows"></div>
  </div>
  <div class="ns-list">
    <h3>Namespaces</h3>
    <div id="nschips"></div>
  </div>
  <div class="feed">
    <div class="feed-head">Hermes Recall Feed <div class="live"></div></div>
    <div class="feed-items" id="feeditems"></div>
  </div>
  <div class="legend">
    <h3>Node Types</h3>
    <div class="legend-items" id="legitems"></div>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="search-wrap"><input type="text" id="searchInput" placeholder="Search nodes..." oninput="filterNodes(this.value)"></div>
  <div class="sep"></div>
  <button onclick="resetCam()">Center</button>
  <button onclick="toggleRotate()" id="btnRotate">Rotate</button>
  <button onclick="showLabels=!showLabels" id="btnLabels" class="active">Labels</button>
  <div class="sep"></div>
  <button id="btnShowAll" class="active" onclick="setNSFilter('')">All</button>
</div>

<!-- Main canvas -->
<canvas id="c"></canvas>

<!-- Burst overlay -->
<canvas id="burstC" class="burst-canvas"></canvas>

<!-- Recall popup container -->
<div id="recallPopups"></div>

<!-- Detail panel -->
<div class="panel" id="pnl">
  <button class="x" onclick="document.getElementById('pnl').classList.remove('open')">✕</button>
  <div class="ph">
    <div class="tag" id="pt"></div>
    <h2 id="pl"></h2>
    <div class="meta" id="pm"></div>
  </div>
  <div class="pb">
    <h3>Content</h3><div class="c" id="pc"></div>
    <h3>Summary</h3><div class="c" id="ps"></div>
    <h3>Connections</h3><div id="pp"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="tst"></div>

<script>
// === Node type config with icons/avatars ===
const TC={
  project:{c:'#00ff88',r:[0,255,136],s:14,icon:'◈',shape:'hex',emoji:'🚀'},
  decision:{c:'#0088ff',r:[0,136,255],s:12,icon:'◆',shape:'diamond',emoji:'🧠'},
  fact:{c:'#ffaa00',r:[255,170,0],s:9,icon:'●',shape:'circle',emoji:'📌'},
  preference:{c:'#ff00ff',r:[255,0,255],s:9,icon:'★',shape:'star',emoji:'💜'},
  problem:{c:'#ff4444',r:[255,68,68],s:11,icon:'⚠',shape:'triangle',emoji:'🔴'},
  advice:{c:'#88ff00',r:[136,255,0],s:9,icon:'↗',shape:'arrow',emoji:'💡'},
  topic:{c:'#8888ff',r:[136,136,255],s:10,icon:'◈',shape:'hex',emoji:'📚'},
  person:{c:'#ff8800',r:[255,136,0],s:12,icon:'☺',shape:'circle',emoji:'👤'},
  event:{c:'#00ffff',r:[0,255,255],s:9,icon:'◎',shape:'ring',emoji:'⚡'},
  concept:{c:'#aaaaff',r:[170,170,255],s:8,icon:'◇',shape:'diamond',emoji:'💭'},
  agent:{c:'#ff88cc',r:[255,136,204],s:12,icon:'⚡',shape:'star',emoji:'🤖'}
};

const RECALL_TYPES={search:'#ffaa00',ask:'#0088ff',recall:'#00ff88',snapshot:'#ff00ff',edge:'#aaaaff',create:'#88ff00'};

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const burstCanvas=document.getElementById('burstC'),bctx=burstCanvas.getContext('2d');
let W,H,nodes=[],edges=[],nodeMap=new Map(),cam={x:0,y:0,z:1},autoR=false,showLabels=true;
let drag=false,dragStart={x:0,y:0},camStart={x:0,y:0},hovered=null,selected=null;
let particles=[],bursts=[],recallPopups=[];
let recallCount=0,nsFilter='',activityFeed=[],searchQuery='';
let lastSnapshotCount=0,lastNodeCount=0;

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;burstCanvas.width=W;burstCanvas.height=H;burstCanvas.style.width=W+'px';burstCanvas.style.height=H+'px';}
window.onresize=resize;resize();

// === Data Loading ===
async function load(){
  toast('Loading graph...');
  const d=await(await fetch('/api/v1/graph')).json();
  document.getElementById('sn').textContent=d.nodes.length;
  document.getElementById('se').textContent=d.edges.length;
  lastNodeCount=d.nodes.length;
  buildGraph(d);
  renderLegend(d);
  renderNamespaceChips(d);
  renderDataSidebar(d);
  toast(d.nodes.length+' nodes loaded');
}

function buildGraph(data){
  // Clear old data properly to release memory
  for(const e of edges){e.particles.length=0;}
  edges.length=0;
  bursts.length=0;
  nodeMap.clear();
  nodes.forEach(n=>{n.glowTrail.length=0;});
  nodes.length=0;

  nodes=data.nodes.map((n,i)=>{
    const tc=TC[n.node_type]||TC.concept;
    const angle=(i/data.nodes.length)*Math.PI*2;
    const radius=150+Math.random()*200;
    return{id:n.id,label:n.label,type:n.node_type,ns:n.namespace,
      summary:n.summary,content:n.content,imp:n.importance||0.5,acc:n.access_count||0,
      x:Math.cos(angle)*radius,y:Math.sin(angle)*radius,vx:0,vy:0,
      color:tc.c,rgb:tc.r,size:tc.s*(0.6+(n.importance||0.5)*0.4+(n.access_count||0)*0.05),
      icon:tc.icon,emoji:tc.emoji,
      pulse:Math.random()*Math.PI*2,visible:true,highlighted:false,
      glowTrail:[]};
  });
  for(const n of nodes)nodeMap.set(n.id,n);
  edges=data.edges.map(e=>({src:e.source,dst:e.target,type:e.edge_type,w:e.weight||1,
    particles:[],nextSpawn:Math.random()*60,burstTimer:0,glow:0}));
  cam={x:0,y:0,z:1};
  // Reset reusable arrays
  visNodesCache.length=0;
  physicsFrame=0;
}

// === Physics (optimized: spatial partitioning + edge-only attraction) ===
let physicsFrame=0;
// Reusable array to avoid per-frame GC pressure
let visNodesCache=[];
function physics(){
  physicsFrame++;
  const repulsion=5000,attraction=0.005,damping=0.85,centerPull=0.001;

  // Reuse array instead of creating new one each frame
  visNodesCache.length=0;
  for(const n of nodes){if(n.visible)visNodesCache.push(n);}
  const visCount=visNodesCache.length;

  // For large graphs, skip full repulsion every other frame
  const skipRepulsion=visCount>60&&physicsFrame%2===0;

  if(!skipRepulsion){
    // Only calculate repulsion for visible, nearby pairs (skip >500px apart)
    for(let i=0;i<visCount;i++){
      const a=visNodesCache[i];
      for(let j=i+1;j<visCount;j++){
        const b=visNodesCache[j];
        let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
        if(d2>250000)continue;
        let dist=Math.sqrt(d2)||1;
        let f=repulsion/(dist*dist);
        let fx=dx/dist*f,fy=dy/dist*f;
        a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
      }
      a.vx-=a.x*centerPull;a.vy-=a.y*centerPull;
    }
  }
  for(const e of edges){
    const a=nodeMap.get(e.src),b=nodeMap.get(e.dst);
    if(!a||!b||!a.visible||!b.visible)continue;
    let dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    let f=(dist-150)*attraction*e.w;
    a.vx+=dx/dist*f;a.vy+=dy/dist*f;b.vx-=dx/dist*f;b.vy-=dy/dist*f;
  }
  for(const n of nodes){
    if(!n.visible){n.vx=0;n.vy=0;continue;}
    n.vx*=damping;n.vy*=damping;n.x+=n.vx;n.y+=n.vy;
  }
}

// === Render ===
let frameCount=0,lastFps=performance.now(),renderRunning=true;

function render(){
  if(!renderRunning)return;
  try{
    physics();
    ctx.fillStyle='#08080d';ctx.fillRect(0,0,W,H);
    if(autoR)cam.x+=0.3;
    const cx=W/2,cy=H/2;
    drawGrid(cx,cy);
    drawParticles(cx,cy);
    drawEdges(cx,cy);
    drawNodes(cx,cy);
    drawBursts();
    drawRecallPopups();
    frameCount++;
    if(performance.now()-lastFps>=1000){document.getElementById('sf').textContent=frameCount;frameCount=0;lastFps=performance.now();}
  }catch(e){console.error('Render error:',e);}
  requestAnimationFrame(render);
}

function drawGrid(cx,cy){
  const gridSize=80*cam.z;
  const startX=((-cam.x*cam.z+cx)%gridSize+gridSize)%gridSize;
  const startY=((-cam.y*cam.z+cy)%gridSize+gridSize)%gridSize;
  ctx.strokeStyle='rgba(255,255,255,0.015)';ctx.lineWidth=0.5;
  for(let x=startX;x<W;x+=gridSize){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=startY;y<H;y+=gridSize){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawEdges(cx,cy){
  for(const e of edges){
    const a=nodeMap.get(e.src),b=nodeMap.get(e.dst);
    if(!a||!b||!a.visible||!b.visible)continue;
    const ax=(a.x-cam.x)*cam.z+cx,ay=(a.y-cam.y)*cam.z+cy;
    const bx=(b.x-cam.x)*cam.z+cx,by=(b.y-cam.y)*cam.z+cy;

    // Ambient glow
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
    ctx.strokeStyle=`rgba(${a.rgb[0]},${a.rgb[1]},${a.rgb[2]},${0.04+e.glow*0.2})`;
    ctx.lineWidth=(3+e.glow*4)*cam.z;ctx.stroke();

    // Core line
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
    const alpha=0.1+e.w*0.05+(a.highlighted||b.highlighted?0.15:0)+e.glow*0.3;
    ctx.strokeStyle=`rgba(${a.rgb[0]},${a.rgb[1]},${a.rgb[2]},${alpha})`;
    ctx.lineWidth=(0.5+e.w*0.3+e.glow*2)*cam.z;ctx.stroke();

    e.glow*=0.95;

    // Flow particles
    e.nextSpawn--;
    if(e.nextSpawn<=0&&e.particles.length<2){
      e.particles.push({t:0,speed:0.005+Math.random()*0.008,color:a.rgb});
      e.nextSpawn=30+Math.random()*60;
    }
    for(let i=e.particles.length-1;i>=0;i--){
      const p=e.particles[i];p.t+=p.speed;
      if(p.t>1){e.particles.splice(i,1);continue;}
      const px=ax+(bx-ax)*p.t,py=ay+(by-ay)*p.t;
      const pa=1-Math.abs(p.t-0.5)*2;
      ctx.beginPath();ctx.arc(px,py,1.5*cam.z,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${pa*0.9})`;ctx.fill();
    }
  }
}

function drawNodes(cx,cy){
  const time=performance.now()*0.001;
  const lod=cam.z>0.5?'high':cam.z>0.25?'medium':'low';
  for(const n of nodes){
    if(!n.visible)continue;
    const sx=(n.x-cam.x)*cam.z+cx,sy=(n.y-cam.y)*cam.z+cy;

    // Skip if offscreen
    if(sx<-50||sx>W+50||sy<-50||sy>H+50)continue;

    const sz=n.size*cam.z;
    const pulse=lod==='high'?0.85+0.15*Math.sin(time*2+n.pulse):1;
    const isHov=hovered===n,isSel=selected===n,isHL=n.highlighted;

    // Outer glow (skip in low LOD)
    if(lod!=='low'||isHov||isHL){
      const glowSz=sz*(isHov||isHL?3.5:2)*pulse;
      const grad=ctx.createRadialGradient(sx,sy,0,sx,sy,glowSz);
      const glowAlpha=isHL?0.25:isHov?0.2:0.08;
      grad.addColorStop(0,`rgba(${n.rgb[0]},${n.rgb[1]},${n.rgb[2]},${glowAlpha*pulse})`);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(sx,sy,glowSz,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    }

    // Axon spikes (high LOD only, for important nodes)
    if(lod==='high'&&(n.imp>0.6||n.acc>3||isHL)){
      const sp=Math.min(n.acc||4,8);
      for(let i=0;i<sp;i++){
        const angle=(i/sp)*Math.PI*2+n.pulse*0.1;
        const len=sz*(1.3+Math.sin(time*1.5+i)*0.4);
        ctx.beginPath();ctx.moveTo(sx+Math.cos(angle)*sz*0.4,sy+Math.sin(angle)*sz*0.4);
        ctx.lineTo(sx+Math.cos(angle)*len,sy+Math.sin(angle)*len);
        ctx.strokeStyle=`rgba(${n.rgb[0]},${n.rgb[1]},${n.rgb[2]},${isHL?0.5:0.25})`;
        ctx.lineWidth=1*cam.z;ctx.stroke();
      }
    }

    // Core shape
    drawNodeShape(ctx,sx,sy,sz*pulse,n);

    // Inner highlight (high LOD only)
    if(lod==='high'){
      ctx.beginPath();ctx.arc(sx-sz*0.2,sy-sz*0.2,sz*0.35,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();
    }

    // Avatar/emoji for person/agent/project nodes
    if(['person','agent','project'].includes(n.type)){
      const avSz=Math.max(10,sz*1.4*cam.z);
      ctx.font=`${avSz}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.emoji,sx,sy+1);
    } else {
      const iconSize=Math.max(8,sz*0.9*cam.z);
      ctx.font=`${iconSize}px SF Mono,monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=isHov||isSel?'#fff':'rgba(255,255,255,0.7)';
      ctx.fillText(n.icon,sx,sy+0.5);
    }

    // Selection ring
    if(isSel){
      ctx.beginPath();ctx.arc(sx,sy,sz+6,0,Math.PI*2);
      ctx.strokeStyle=n.color;ctx.lineWidth=2*cam.z;
      ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    }
    if(isHov){
      ctx.beginPath();ctx.arc(sx,sy,sz+8,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1*cam.z;ctx.stroke();
    }

    // Label (skip in low LOD)
    if(showLabels&&lod!=='low'){
      const fontSize=Math.max(9,11*cam.z);
      ctx.font=`${fontSize}px SF Mono,monospace`;ctx.textAlign='center';
      ctx.fillStyle=isHov||isSel?'#fff':isHL?n.color:'#666';
      const lbl=n.label.length>24?n.label.substring(0,22)+'…':n.label;
      ctx.fillText(lbl,sx,sy+sz+fontSize+3);
    }

    // Glow trail (cap and limit in low LOD)
    if(n.glowTrail.length>3)n.glowTrail.splice(0,n.glowTrail.length-3);
    if(n.glowTrail.length>0&&lod!=='low'){
      for(let i=n.glowTrail.length-1;i>=0;i--){
        const g=n.glowTrail[i];g.life-=0.03;
        if(g.life<=0){n.glowTrail.splice(i,1);continue;}
        ctx.beginPath();ctx.arc(sx,sy,sz*2*g.life,0,Math.PI*2);
        ctx.strokeStyle=`rgba(${n.rgb[0]},${n.rgb[1]},${n.rgb[2]},${g.life*0.3})`;
        ctx.lineWidth=1.5*cam.z;ctx.stroke();
      }
    }
  }
}

function drawNodeShape(c,x,y,s,n){
  switch(TC[n.type]?.shape){
    case'diamond':
      c.beginPath();c.moveTo(x,y-s);c.lineTo(x+s*0.7,y);c.lineTo(x,y+s);c.lineTo(x-s*0.7,y);c.closePath();c.fillStyle=n.color;c.fill();break;
    case'triangle':
      c.beginPath();c.moveTo(x,y-s*1.1);c.lineTo(x+s,y+s*0.7);c.lineTo(x-s,y+s*0.7);c.closePath();c.fillStyle=n.color;c.fill();break;
    case'star':
      drawStar(c,x,y,5,s*0.5,s,n.color);break;
    case'hex':
      drawHex(c,x,y,s,n.color);break;
    case'ring':
      c.beginPath();c.arc(x,y,s,0,Math.PI*2);c.strokeStyle=n.color;c.lineWidth=2;c.stroke();
      c.beginPath();c.arc(x,y,s*0.4,0,Math.PI*2);c.fillStyle=n.color;c.fill();break;
    default:
      c.beginPath();c.arc(x,y,s,0,Math.PI*2);c.fillStyle=n.color;c.fill();
  }
}

function drawStar(c,x,y,spikes,innerR,outerR,color){
  c.beginPath();
  for(let i=0;i<spikes*2;i++){const r=i%2===0?outerR:innerR;const a=(i/(spikes*2))*Math.PI*2-Math.PI/2;
    i===0?c.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):c.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}
  c.closePath();c.fillStyle=color;c.fill();
}
function drawHex(c,x,y,r,color){
  c.beginPath();
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/6;
    i===0?c.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):c.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}
  c.closePath();c.fillStyle=color;c.fill();
}

// === Ambient Particles ===
const MAX_PARTICLES=60;
function initParticles(){
  for(let i=0;i<MAX_PARTICLES;i++){
    particles.push({x:(Math.random()-0.5)*2000,y:(Math.random()-0.5)*2000,
      vx:(Math.random()-0.5)*0.1,vy:(Math.random()-0.5)*0.1,
      alpha:0.03+Math.random()*0.08,size:0.2+Math.random()*0.8,
      color:Math.random()>0.8?[0,255,136]:[60,60,80]});
  }
}
function drawParticles(cx,cy){
  // Only draw particles in viewport
  const margin=100;
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<-1000)p.x=1000;if(p.x>1000)p.x=-1000;
    if(p.y<-1000)p.y=1000;if(p.y>1000)p.y=-1000;
    const sx=(p.x-cam.x)*cam.z+cx,sy=(p.y-cam.y)*cam.z+cy;
    // Skip if offscreen
    if(sx<-margin||sx>W+margin||sy<-margin||sy>H+margin)continue;
    ctx.beginPath();ctx.arc(sx,sy,p.size*cam.z,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.alpha})`;ctx.fill();
  }
}

// === Burst Effects ===
function triggerBurst(nodeId,color){
  const n=nodeMap.get(nodeId);
  if(!n)return;
  if(bursts.length>20)bursts.splice(0,bursts.length-20); // cap burst count
  const cx=W/2,cy=H/2;
  const sx=(n.x-cam.x)*cam.z+cx,sy=(n.y-cam.y)*cam.z+cy;
  bursts.push({x:sx,y:sy,t:0,color:color||n.rgb,size:n.size*cam.z*2});
  for(const e of edges){if(e.src===nodeId||e.dst===nodeId)e.glow=1;}
  n.highlighted=true;n.glowTrail.push({life:1});
  const nid=nodeId;
  setTimeout(()=>{const nd=nodeMap.get(nid);if(nd)nd.highlighted=false;},3000);
}

function drawBursts(){
  bctx.clearRect(0,0,W,H);
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];b.t+=0.02;
    if(b.t>1){bursts.splice(i,1);continue;}
    const r=b.size*(1+b.t*3);const alpha=(1-b.t)*0.6;
    // Expanding ring
    bctx.beginPath();bctx.arc(b.x,b.y,r,0,Math.PI*2);
    bctx.strokeStyle=`rgba(${b.color[0]},${b.color[1]},${b.color[2]},${alpha})`;
    bctx.lineWidth=2*(1-b.t);bctx.stroke();
    // Inner flash
    const grad=bctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r*0.5);
    grad.addColorStop(0,`rgba(${b.color[0]},${b.color[1]},${b.color[2]},${alpha*0.3})`);
    grad.addColorStop(1,'rgba(0,0,0,0)');
    bctx.beginPath();bctx.arc(b.x,b.y,r*0.5,0,Math.PI*2);bctx.fillStyle=grad;bctx.fill();
    // Radiating particles
    for(let j=0;j<6;j++){
      const angle=(j/6)*Math.PI*2+b.t*3;const pr=r*0.8;
      const px=b.x+Math.cos(angle)*pr,py=b.y+Math.sin(angle)*pr;
      bctx.beginPath();bctx.arc(px,py,1.5*(1-b.t),0,Math.PI*2);
      bctx.fillStyle=`rgba(${b.color[0]},${b.color[1]},${b.color[2]},${alpha})`;bctx.fill();
    }
  }
}

// === Recall Popups (floating notifications near recalled nodes) ===
function showRecallPopup(nodeId,text,type){
  const n=nodeMap.get(nodeId);if(!n)return;
  const container=document.getElementById('recallPopups');
  // Cap popups in DOM
  while(container.children.length>5)container.removeChild(container.firstChild);
  const cx=W/2,cy=H/2;
  const sx=(n.x-cam.x)*cam.z+cx,sy=(n.y-cam.y)*cam.z+cy;
  const color=RECALL_TYPES[type]||'#888';
  const el=document.createElement('div');
  el.className='recall-popup';
  el.style.left=Math.max(270,Math.min(W-300,sx-140))+'px';
  el.style.top=Math.max(50,sy-n.size*cam.z-60)+'px';
  el.innerHTML=`<div class="rp-card"><div class="rp-type" style="color:${color}">${type.toUpperCase()}</div><div class="rp-text">${text}</div></div>`;
  container.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

function drawRecallPopups(){
  // Popups are CSS-based, nothing to draw on canvas
}

// === Data Sidebar (like video's file-type list) ===
function renderDataSidebar(data){
  const typeCounts={};
  data.nodes.forEach(n=>{typeCounts[n.node_type]=(typeCounts[n.node_type]||0)+1;});
  const maxCount=Math.max(...Object.values(typeCounts),1);
  const el=document.getElementById('dataRows');
  el.innerHTML=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(([type,count])=>{
    const tc=TC[type]||TC.concept;
    const pct=(count/maxCount*100).toFixed(0);
    return`<div class="data-row" onclick="filterByType('${type}')">
      <div class="ext" style="color:${tc.c}">${tc.icon}</div>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${tc.c}"></div></div>
      <div class="count">${count}</div>
    </div>`;
  }).join('');
}

function filterByType(type){
  nodes.forEach(n=>{
    n.visible=(!nsFilter||n.ns===nsFilter)&&(n.type===type||!type);
    n.highlighted=n.type===type;
  });
  toast('Showing: '+type);
}

// === Activity Feed ===
function addFeedItem(type,text,relatedNodes=[],sourceLabel=''){
  const now=new Date();
  const time=now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const color=RECALL_TYPES[type]||'#888';
  const item={time,type,text,nodes:relatedNodes,color,sourceLabel};
  activityFeed.unshift(item);
  if(activityFeed.length>30)activityFeed.pop();
  renderFeed();
  relatedNodes.forEach(id=>{if(nodeMap.has(id))triggerBurst(id,color);});
  recallCount++;document.getElementById('sr').textContent=recallCount;
}

function renderFeed(){
  const el=document.getElementById('feeditems');
  el.innerHTML=activityFeed.slice(0,30).map(item=>{
    const nodeChips=item.nodes.slice(0,4).map(id=>{
      const n=nodeMap.get(id);
      if(!n)return'';
      const tc=TC[n.type]||TC.concept;
      return`<span class="fi-node" style="background:${tc.c}18;color:${tc.c};border:1px solid ${tc.c}30" onclick="focusNode('${id}')">${n.label.substring(0,18)}</span>`;
    }).filter(Boolean).join('');
    return`<div class="feed-item">
      <div class="fi-header">
        <span class="fi-badge" style="background:${item.color}18;color:${item.color}">${item.type}</span>
        <span class="fi-time">${item.time}</span>
      </div>
      <div class="fi-text">${item.text}</div>
      ${nodeChips?`<div class="fi-nodes">${nodeChips}</div>`:''}
    </div>`;
  }).join('');
}

// === Real-Time Hermes Recall Integration (optimized) ===
let lastSnapshotHash='',lastGraphCheck=0,pollBusy=false;
async function pollHermesRecalls(){
  if(pollBusy)return; // prevent overlapping polls
  pollBusy=true;
  try{
    // Check snapshot changes (Hermes fetches snapshot on every message)
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),4000);
    const resp=await fetch('/api/v1/snapshot?namespace='+(nsFilter||'hermes'),{signal:controller.signal});
    clearTimeout(timer);
    const snap=await resp.json();
    if(snap&&snap.content){
      const hash=snap.content.length+':'+snap.token_count;
      if(hash!==lastSnapshotHash){
        lastSnapshotHash=hash;
        // Find which nodes were included in the snapshot
        const snapNodes=[];
        const snapLower=snap.content.toLowerCase();
        for(const n of nodes){
          if(snapNodes.length>=3)break;
          if(snapLower.includes(n.label.toLowerCase().substring(0,15))){
            snapNodes.push(n);
          }
        }
        if(snapNodes.length>0){
          addFeedItem('snapshot',
            `Snapshot: ${snap.token_count} tokens, ${snapNodes.length} memories`,
            snapNodes.map(n=>n.id));
          showRecallPopup(snapNodes[0].id,`Snapshot: ${snap.token_count} tokens`,'snapshot');
        }
      }
    }
  }catch(e){}

  // Check access_count deltas via single graph fetch (not individual node calls)
  const now=Date.now();
  if(now-lastGraphCheck>=15000){
    try{
      const gc=new AbortController();
      const gTimer=setTimeout(()=>gc.abort(),5000);
      const g=await(await fetch('/api/v1/nodes?limit=500',{signal:gc.signal})).json();
      clearTimeout(gTimer);
      lastGraphCheck=Date.now(); // only set after successful fetch
      if(Array.isArray(g)&&g.length!==lastNodeCount){
        const newNodes=g.filter(n=>!nodeMap.has(n.id)&&n.namespace!=='test');
        for(const nn of newNodes){
          addFeedItem('create',`New memory: ${nn.label.substring(0,35)}`,[nn.id],nn.namespace);
        }
        if(newNodes.length>0){
          const fullGraph=await(await fetch('/api/v1/graph')).json();
          buildGraph(fullGraph);
          renderDataSidebar(fullGraph);
          document.getElementById('sn').textContent=fullGraph.nodes.length;
          document.getElementById('se').textContent=fullGraph.edges.length;
        }
        lastNodeCount=g.length;
      }
      // Check access_count deltas from the bulk fetch (no per-node calls)
      if(Array.isArray(g)){
        for(const remote of g){
          // Skip test namespace nodes
          if(remote.namespace==='test')continue;
          const local=nodeMap.get(remote.id);
          if(local&&remote.access_count>local.acc){
            const delta=remote.access_count-local.acc;
            local.acc=remote.access_count;
            addFeedItem('recall',
              `Recalled: ${local.label.substring(0,35)} (+${delta}x)`,
              [local.id]);
            showRecallPopup(local.id,`${local.label.substring(0,25)}`,'recall');
          }
        }
      }
    }catch(e){}
  }
  pollBusy=false;
}

// === Simulated Recall (fills gaps when no real activity) ===
function simulateRecall(){
  if(nodes.length===0)return;
  // Only pick from visible nodes in current namespace filter
  const visNodes=nodes.filter(n=>n.visible);
  if(visNodes.length===0)return;
  const randomNode=visNodes[Math.floor(Math.random()*visNodes.length)];
  const types=['search','ask','recall'];
  const type=types[Math.floor(Math.random()*types.length)];
  const texts={
    search:`Search: "${randomNode.label.substring(0,25)}"`,
    ask:`Query: "What about ${randomNode.label.substring(0,20)}?"`,
    recall:`Recalled: ${randomNode.label.substring(0,30)}`
  };
  const connected=edges.filter(e=>(e.src===randomNode.id||e.dst===randomNode.id))
    .map(e=>e.src===randomNode.id?e.dst:e.src)
    .filter(id=>{const nd=nodeMap.get(id);return nd&&nd.visible;}).slice(0,3);
  addFeedItem(type,texts[type],[randomNode.id,...connected]);
  showRecallPopup(randomNode.id,texts[type],type);
}

// === Namespace & Filter ===
function renderNamespaceChips(data){
  const nsMap={};data.nodes.forEach(n=>{nsMap[n.namespace]=(nsMap[n.namespace]||0)+1;});
  const colors=['#00ff88','#0088ff','#ffaa00','#ff00ff','#ff4444','#88ff00','#00ffff'];
  const el=document.getElementById('nschips');
  el.innerHTML=Object.entries(nsMap).map(([ns,count],i)=>{
    const c=colors[i%colors.length];
    return`<div class="ns-chip ${ns===nsFilter?'active':''}" onclick="setNSFilter('${ns}')">
      <div class="ns-dot" style="background:${c};box-shadow:0 0 6px ${c}"></div>
      <div class="ns-name">${ns}</div>
      <div class="ns-count">${count}</div>
    </div>`;
  }).join('');
}

function setNSFilter(ns){
  nsFilter=ns;nodes.forEach(n=>{n.visible=!ns||n.ns===ns;});
  document.getElementById('btnShowAll').classList.toggle('active',!ns);
  document.querySelectorAll('.ns-chip').forEach(c=>{
    c.classList.toggle('active',c.querySelector('.ns-name').textContent===ns);
  });
}

function filterNodes(q){
  searchQuery=q.toLowerCase();
  nodes.forEach(n=>{
    if(!q){n.visible=nsFilter?n.ns===nsFilter:true;n.highlighted=false;return;}
    n.visible=n.label.toLowerCase().includes(searchQuery)||n.content?.toLowerCase().includes(searchQuery);
    n.highlighted=n.visible;
  });
}

function toggleRotate(){autoR=!autoR;document.getElementById('btnRotate').classList.toggle('active',autoR);}

// === Interaction ===
canvas.onmousedown=e=>{drag=true;dragStart={x:e.clientX,y:e.clientY};camStart={x:cam.x,y:cam.y};};
canvas.onmousemove=e=>{
  if(drag){cam.x=camStart.x-(e.clientX-dragStart.x)/cam.z;cam.y=camStart.y-(e.clientY-dragStart.y)/cam.z;}
  const cx=W/2,cy=H/2;hovered=null;
  for(const n of nodes){
    if(!n.visible)continue;
    const sx=(n.x-cam.x)*cam.z+cx,sy=(n.y-cam.y)*cam.z+cy;
    const dx=e.clientX-sx,dy=e.clientY-sy;
    if(dx*dx+dy*dy<(n.size*cam.z+10)**2){hovered=n;break;}
  }
  canvas.style.cursor=hovered?'pointer':drag?'grabbing':'grab';
};
canvas.onmouseup=()=>{drag=false;};
document.onmouseup=()=>{drag=false;}; // release if mouse leaves canvas
canvas.onclick=e=>{
  if(hovered&&Math.abs(e.clientX-dragStart.x)<5&&Math.abs(e.clientY-dragStart.y)<5){
    selected=hovered;showNodePanel(hovered);triggerBurst(hovered.id);
  }
};
canvas.onwheel=e=>{e.preventDefault();cam.z=Math.max(0.1,Math.min(5,cam.z*(e.deltaY>0?0.9:1.1)));};

// === Detail Panel ===
async function showNodePanel(n){
  const tc=TC[n.type]||TC.concept;
  document.getElementById('pt').textContent=n.type.toUpperCase();
  document.getElementById('pt').style.background=tc.c+'25';
  document.getElementById('pt').style.color=tc.c;
  document.getElementById('pl').textContent=n.label;
  document.getElementById('pm').textContent=`${n.ns} · importance: ${n.imp.toFixed(2)} · accessed ${n.acc}x`;
  document.getElementById('pc').textContent=n.content||'—';
  document.getElementById('ps').textContent=n.summary||'—';
  try{
    const nb=await(await fetch('/api/v1/nodes/'+n.id+'/neighbors')).json();
    const pp=document.getElementById('pp');
    pp.innerHTML=Array.isArray(nb)?nb.map(x=>{
      const nc=TC[x.node_type]||TC.concept;
      return`<div class="nb" onclick="focusNode('${x.id}')">
        <div class="nb-type" style="background:${nc.c}"></div>
        <div class="nb-edge">${x.edge_type}</div>
        <div style="color:${nc.c};flex:1">${x.label}</div>
      </div>`;
    }).join(''):'<div style="color:#444;font-size:11px;padding:8px 0">No connections</div>';
  }catch(e){}
  document.getElementById('pnl').classList.add('open');
}

async function focusNode(id){
  const n=nodeMap.get(id);
  if(n){cam.x=n.x;cam.y=n.y;selected=n;showNodePanel(n);triggerBurst(n.id);}
}

function resetCam(){cam.x=0;cam.y=0;cam.z=1;}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

function renderLegend(data){
  const types=new Set(data.nodes.map(n=>n.node_type));
  const el=document.getElementById('legitems');
  el.innerHTML=Object.entries(TC).filter(([t])=>types.has(t)).map(([t,tc])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${tc.c};box-shadow:0 0 4px ${tc.c}"></div>${tc.icon} ${t}</div>`
  ).join('');
}

document.onkeydown=e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='Escape')document.getElementById('pnl').classList.remove('open');
  if(e.key==='r'&&!e.ctrlKey)resetCam();
};

// === Init ===
initParticles();load();render();

// Real-time polling every 5s (optimized)
setInterval(pollHermesRecalls,5000);

// Fallback simulation every 10-20s when no real activity
function scheduleSim(){setTimeout(()=>{simulateRecall();scheduleSim();},10000+Math.random()*10000);}
setTimeout(scheduleSim,12000);

// Pause rendering when tab is hidden to save resources
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    renderRunning=false;
  }else{
    if(!renderRunning){renderRunning=true;render();}
  }
});
</script>
