<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBank — Updates</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;background:#08080d;color:#e0e0e0;min-height:100vh}
.header{background:#0c0c12;border-bottom:1px solid #16162a;padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.header h1{font-size:16px;color:#00ff88;letter-spacing:3px;text-shadow:0 0 15px #00ff8830}
.header .live{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header a{margin-left:auto;font-size:12px;color:#555;text-decoration:none}
.header a:hover{color:#00ff88}
.tabs{display:flex;gap:0;margin-left:20px}
.tab{padding:6px 16px;cursor:pointer;font-family:inherit;font-size:12px;color:#555;background:transparent;border:none;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:#888}.tab.active{color:#00ff88;border-bottom-color:#00ff88}
a.tab{text-decoration:none}.a.tab:hover{color:#888}
.container{max-width:800px;margin:40px auto;padding:0 20px}
.card{background:#0c0c12;border:1px solid #16162a;border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:13px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.version-row{display:flex;align-items:center;gap:20px;margin-bottom:12px}
.version-box{flex:1;text-align:center;padding:16px;border-radius:6px}
.version-box.current{background:#ffffff06;border:1px solid #ffffff10}
.version-box.latest{background:#00ff8810;border:1px solid #00ff8830}
.version-box .label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.version-box .ver{font-size:28px;font-weight:bold}
.version-box.current .ver{color:#888}
.version-box.latest .ver{color:#00ff88;text-shadow:0 0 10px #00ff8820}
.version-box .date{font-size:10px;color:#444;margin-top:4px}
.arrow{font-size:24px;color:#333}
.status-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:bold;text-transform:uppercase}
.status-badge.up-to-date{background:#00ff8818;color:#00ff88;border:1px solid #00ff8830}
.status-badge.update-available{background:#ff880018;color:#ff8800;border:1px solid #ff880030}
.status-badge.legacy{background:#8800ff18;color:#8800ff;border:1px solid #8800ff30}
.info-row{display:flex;gap:12px;font-size:11px;color:#555;margin-bottom:12px}
.info-row span{background:#ffffff06;padding:3px 8px;border-radius:3px}
.changelog{background:#ffffff04;border:1px solid #ffffff08;border-radius:6px;padding:12px;font-size:12px;line-height:1.6;color:#888;max-height:200px;overflow-y:auto;white-space:pre-wrap}
.changelog::-webkit-scrollbar{width:4px}
.changelog::-webkit-scrollbar-thumb{background:#222}
.btn{background:#00ff8818;color:#00ff88;border:1px solid #00ff8830;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s}
.btn:hover{background:#00ff8830}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-blue{background:#0088ff18;color:#0088ff;border-color:#0088ff30}
.btn-blue:hover{background:#0088ff30}
.btn-red{background:#ff444418;color:#ff4444;border-color:#ff444430}
.btn-red:hover{background:#ff444430}
.actions{display:flex;gap:8px;margin-top:14px}
.progress{height:4px;background:#ffffff06;border-radius:2px;margin-top:12px;overflow:hidden;display:none}
.progress.active{display:block}
.progress-bar{height:100%;background:#00ff88;border-radius:2px;transition:width .3s;width:0}
.log{background:#06060a;border:1px solid #16162a;border-radius:6px;padding:12px;font-size:11px;line-height:1.5;color:#666;max-height:300px;overflow-y:auto;white-space:pre-wrap;display:none;margin-top:12px}
.log.active{display:block}
.log::-webkit-scrollbar{width:4px}
.log::-webkit-scrollbar-thumb{background:#222}
.log .line-err{color:#ff4444}
.log .line-ok{color:#00ff88}
.backup-info{font-size:10px;color:#444;margin-top:8px}
.loading{text-align:center;color:#444;padding:40px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #333;border-top-color:#00ff88;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div class="live"></div><h1>MINDBANK</h1>
  <div class="tabs">
    <a href="/" class="tab">Dashboard</a>
    <a href="/" class="tab">Questions</a>
    <a href="/" class="tab">Edges</a>
    <a href="/" class="tab">Tools</a>
    <a href="/graph-view" class="tab">Graph 2D</a>
    <a href="/" class="tab">Brain 3D</a>
    <a href="/updates" class="tab active">Updates</a>
  </div>
</div>

<div class="container">
  <div id="loadingState" class="loading">
    <span class="spinner"></span> Checking for updates...
  </div>

  <div id="updateContent" style="display:none">
    <!-- Version comparison -->
    <div class="card">
      <h2>Version</h2>
      <div class="version-row">
        <div class="version-box current">
          <div class="label">Current</div>
          <div class="ver" id="localVersion">—</div>
        </div>
        <div class="arrow">→</div>
        <div class="version-box latest">
          <div class="label">Latest</div>
          <div class="ver" id="remoteVersion">—</div>
          <div class="date" id="releaseDate"></div>
        </div>
      </div>
      <div class="info-row">
        <span id="installType"></span>
        <span id="installDir"></span>
      </div>
      <div>
        <span id="statusBadge" class="status-badge"></span>
      </div>
    </div>

    <!-- Changelog -->
    <div class="card">
      <h2>Changelog</h2>
      <div class="changelog" id="changelog">No changelog available.</div>
    </div>

    <!-- Actions -->
    <div class="card">
      <h2>Actions</h2>
      <div class="actions">
        <button class="btn btn-blue" onclick="checkUpdate()" id="btnCheck">Check for Updates</button>
        <button class="btn" onclick="runUpdate()" id="btnUpdate" disabled>Update Now</button>
      </div>
      <div class="progress" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="log" id="updateLog"></div>
      <div id="restartSection" style="display:none;margin-top:12px">
        <p style="font-size:11px;color:#888;margin-bottom:8px">Update complete. Restart the API to apply changes:</p>
        <button class="btn btn-red" onclick="location.reload()">Reload Page</button>
        <span style="font-size:10px;color:#444;margin-left:8px">Then run: make run</span>
      </div>
    </div>
  </div>
</div>

<script>
let currentJobId = null;
let pollInterval = null;

async function checkUpdate() {
  const btn = document.getElementById('btnCheck');
  btn.disabled = true;
  btn.textContent = 'Checking...';

  try {
    const resp = await fetch('/api/v1/updates/check');
    const data = await resp.json();
    renderUpdate(data);
  } catch (e) {
    document.getElementById('loadingState').innerHTML =
      '<span style="color:#ff4444">Failed to check for updates: ' + e.message + '</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Check for Updates';
  }
}

function renderUpdate(data) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('updateContent').style.display = 'block';

  document.getElementById('localVersion').textContent = data.local || '0.0.0';
  document.getElementById('remoteVersion').textContent = data.remote || 'unknown';
  document.getElementById('releaseDate').textContent = data.date || '';
  document.getElementById('changelog').textContent = data.changelog || 'No changelog available.';
  document.getElementById('installType').textContent = 'Install: ' + (data.install_type || 'unknown');
  document.getElementById('installDir').textContent = data.install_dir || '';

  const badge = document.getElementById('statusBadge');
  const btnUpdate = document.getElementById('btnUpdate');

  if (data.local === '0.0.0') {
    badge.textContent = 'Legacy Install';
    badge.className = 'status-badge legacy';
    btnUpdate.disabled = false;
  } else if (data.needs_update) {
    badge.textContent = 'Update Available';
    badge.className = 'status-badge update-available';
    btnUpdate.disabled = false;
  } else {
    badge.textContent = 'Up to Date';
    badge.className = 'status-badge up-to-date';
    btnUpdate.disabled = true;
  }

  if (data.release_url) {
    document.getElementById('changelog').innerHTML =
      '<a href="' + data.release_url + '" target="_blank" style="color:#00ff88">' +
      'View on GitHub →</a>\n\n' + (data.changelog || '');
  }
}

async function runUpdate() {
  const btnUpdate = document.getElementById('btnUpdate');
  const btnCheck = document.getElementById('btnCheck');
  const progress = document.getElementById('progressContainer');
  const log = document.getElementById('updateLog');

  btnUpdate.disabled = true;
  btnCheck.disabled = true;
  btnUpdate.textContent = 'Updating...';
  progress.classList.add('active');
  log.classList.add('active');
  log.innerHTML = 'Starting update...\n';

  // Animate progress bar
  let progressVal = 0;
  const progressTimer = setInterval(() => {
    progressVal = Math.min(progressVal + Math.random() * 5, 90);
    document.getElementById('progressBar').style.width = progressVal + '%';
  }, 500);

  try {
    const resp = await fetch('/api/v1/updates/run', { method: 'POST' });
    const data = await resp.json();

    if (data.job_id) {
      currentJobId = data.job_id;
      pollInterval = setInterval(() => pollStatus(data.job_id), 1000);
    } else {
      throw new Error('No job ID returned');
    }
  } catch (e) {
    clearInterval(progressTimer);
    log.innerHTML += '<span class="line-err">Error: ' + e.message + '</span>\n';
    btnUpdate.disabled = false;
    btnCheck.disabled = false;
    btnUpdate.textContent = 'Update Now';
    progress.classList.remove('active');
  }
}

async function pollStatus(jobId) {
  try {
    const resp = await fetch('/api/v1/updates/status/' + jobId);
    const data = await resp.json();

    const log = document.getElementById('updateLog');
    log.textContent = data.output || '';

    // Auto-scroll
    log.scrollTop = log.scrollHeight;

    if (data.status === 'success' || data.status === 'error') {
      clearInterval(pollInterval);
      clearInterval(window._progressTimer);

      const progress = document.getElementById('progressBar');
      progress.style.width = '100%';

      const btnUpdate = document.getElementById('btnUpdate');
      const btnCheck = document.getElementById('btnCheck');

      if (data.status === 'success') {
        log.innerHTML += '\n<span class="line-ok">✓ Update complete!</span>\n';
        log.innerHTML += '<span class="line-ok">Restart API to apply changes.</span>\n';
        btnUpdate.textContent = 'Updated ✓';
        btnUpdate.classList.add('btn-blue');
        // Show restart button
        document.getElementById('restartSection').style.display = 'block';
      } else {
        log.innerHTML += '\n<span class="line-err">✗ Update failed. Check log above.</span>\n';
        btnUpdate.textContent = 'Retry';
        btnUpdate.disabled = false;
      }
      btnCheck.disabled = false;
    }
  } catch (e) {
    // Keep polling
  }
}

// Auto-check on load
checkUpdate();
</script>
</body>
</html>
