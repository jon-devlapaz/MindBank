<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBank — Memory Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
  --orange: #f0883e;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* Header */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 18px; font-weight: 600; }
header h1 span { color: var(--accent); }
.header-status { margin-left: auto; display: flex; gap: 12px; font-size: 12px; color: var(--text-dim); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.status-dot.ok { background: var(--green); }
.status-dot.err { background: var(--red); }

/* Tabs */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Panels */
.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; }

/* Graph panel */
#graph-panel { position: relative; }
#graph-canvas { width: 100%; height: 100%; }
.graph-controls { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 6px; }
.graph-controls button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.graph-controls button:hover { border-color: var(--accent); }
.graph-info { position: absolute; bottom: 12px; left: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; max-width: 300px; display: none; }
.graph-info.visible { display: block; }
.graph-info h3 { font-size: 14px; margin-bottom: 6px; }
.graph-info .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-right: 4px; }

/* Nodes panel */
.nodes-layout { display: flex; flex: 1; overflow: hidden; }
.nodes-list { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.nodes-toolbar { padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
.nodes-toolbar input, .nodes-toolbar select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
.nodes-toolbar input { flex: 1; }
.nodes-scroll { overflow-y: auto; flex: 1; }
.node-card { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.node-card:hover { background: var(--surface); }
.node-card.selected { background: #1c2333; border-left: 3px solid var(--accent); }
.node-card .label { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
.node-card .meta { font-size: 12px; color: var(--text-dim); }
.node-detail { flex: 1; padding: 20px; overflow-y: auto; }
.node-detail h2 { font-size: 20px; margin-bottom: 12px; }
.node-detail .field { margin-bottom: 12px; }
.node-detail .field-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
.node-detail .field-value { font-size: 14px; }
.node-detail pre { background: var(--bg); padding: 12px; border-radius: 6px; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
.neighbors-list { margin-top: 16px; }
.neighbors-list .neighbor { padding: 8px 12px; background: var(--bg); border-radius: 6px; margin-bottom: 4px; font-size: 13px; cursor: pointer; }
.neighbors-list .neighbor:hover { background: var(--surface); }

/* Search panel */
.search-panel { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.search-bar { display: flex; gap: 8px; }
.search-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 15px; }
.search-bar button { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; }
.search-bar select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; }
.search-results { overflow-y: auto; flex: 1; }
.search-result { padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
.search-result .label { font-weight: 500; font-size: 15px; }
.search-result .content { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
.search-result .scores { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

/* Snapshot panel */
.snapshot-panel { padding: 20px; overflow-y: auto; }
.snapshot-panel h2 { margin-bottom: 16px; }
.snapshot-content { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.snapshot-actions { margin-bottom: 16px; display: flex; gap: 8px; }
.snapshot-actions button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }

/* Create node modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.visible { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 500px; max-width: 90vw; }
.modal h2 { margin-bottom: 16px; }
.modal .form-group { margin-bottom: 12px; }
.modal label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.modal input, .modal select, .modal textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
.modal textarea { height: 80px; resize: vertical; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent) !important; }
.btn-secondary { background: transparent; color: var(--text); }

/* Tags */
.tag-project { background: #1f3a5f; color: var(--accent); }
.tag-decision { background: #2a1f3f; color: var(--purple); }
.tag-fact { background: #1f3f2a; color: var(--green); }
.tag-preference { background: #3f2a1f; color: var(--orange); }
.tag-problem { background: #3f1f1f; color: var(--red); }
.tag-advice { background: #3f3f1f; color: var(--yellow); }
.tag-default { background: #2a2a2a; color: var(--text-dim); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>🧠 <span>MindBank</span></h1>
  <div class="header-status">
    <span><span class="status-dot" id="status-pg"></span>Postgres</span>
    <span><span class="status-dot" id="status-ollama"></span>Ollama</span>
    <span id="node-count">0 nodes</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="graph">Graph</div>
  <div class="tab" data-tab="nodes">Nodes</div>
  <div class="tab" data-tab="search">Search</div>
  <div class="tab" data-tab="snapshot">Snapshot</div>
</div>

<!-- Graph Panel -->
<div class="panel active" id="graph-panel">
  <canvas id="graph-canvas"></canvas>
  <div class="graph-controls">
    <button onclick="loadGraph()">↻ Refresh</button>
    <button onclick="resetZoom()">⊡ Reset</button>
    <button onclick="openCreateNode()">+ Node</button>
  </div>
  <div class="graph-info" id="graph-info">
    <h3 id="info-label"></h3>
    <span class="tag" id="info-type"></span>
    <span id="info-ns" style="font-size:11px;color:var(--text-dim)"></span>
    <p id="info-summary" style="margin-top:8px;font-size:13px"></p>
    <div id="info-neighbors" style="margin-top:10px;font-size:12px;color:var(--text-dim)"></div>
  </div>
</div>

<!-- Nodes Panel -->
<div class="panel" id="nodes-panel">
  <div class="nodes-layout">
    <div class="nodes-list">
      <div class="nodes-toolbar">
        <input type="text" id="node-search" placeholder="Filter nodes..." oninput="filterNodes()">
        <select id="node-type-filter" onchange="filterNodes()">
          <option value="">All types</option>
          <option value="project">Project</option>
          <option value="decision">Decision</option>
          <option value="fact">Fact</option>
          <option value="preference">Preference</option>
          <option value="problem">Problem</option>
          <option value="advice">Advice</option>
          <option value="person">Person</option>
          <option value="topic">Topic</option>
          <option value="event">Event</option>
          <option value="concept">Concept</option>
        </select>
      </div>
      <div class="nodes-scroll" id="nodes-scroll"></div>
    </div>
    <div class="node-detail" id="node-detail">
      <p style="color:var(--text-dim);text-align:center;margin-top:40px">Select a node to view details</p>
    </div>
  </div>
</div>

<!-- Search Panel -->
<div class="panel" id="search-panel">
  <div class="search-panel">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search memories..." onkeydown="if(event.key==='Enter')doSearch()">
      <select id="search-mode">
        <option value="fts">Full-text</option>
        <option value="semantic">Semantic</option>
        <option value="hybrid" selected>Hybrid</option>
      </select>
      <button onclick="doSearch()">Search</button>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<!-- Snapshot Panel -->
<div class="panel" id="snapshot-panel">
  <div class="snapshot-panel">
    <h2>Wake-up Snapshot</h2>
    <div class="snapshot-actions">
      <button onclick="loadSnapshot()">↻ Refresh</button>
      <button onclick="rebuildSnapshot()">⟳ Rebuild</button>
    </div>
    <div class="snapshot-content" id="snapshot-content">Loading...</div>
  </div>
</div>

<!-- Create Node Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>Create Node</h2>
    <div class="form-group">
      <label>Label</label>
      <input type="text" id="new-label" placeholder="Node name">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="new-type">
        <option value="fact">Fact</option>
        <option value="decision">Decision</option>
        <option value="project">Project</option>
        <option value="preference">Preference</option>
        <option value="problem">Problem</option>
        <option value="advice">Advice</option>
        <option value="person">Person</option>
        <option value="topic">Topic</option>
        <option value="event">Event</option>
        <option value="concept">Concept</option>
      </select>
    </div>
    <div class="form-group">
      <label>Namespace</label>
      <input type="text" id="new-ns" placeholder="global" value="global">
    </div>
    <div class="form-group">
      <label>Summary</label>
      <input type="text" id="new-summary" placeholder="Short description">
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="new-content" placeholder="Full content..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCreateNode()">Cancel</button>
      <button class="btn-primary" onclick="createNode()">Create</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api/v1';
let allNodes = [];
let allEdges = [];
let selectedNode = null;

// === Health Check ===
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const h = await r.json();
    document.getElementById('status-pg').className = 'status-dot ' + (h.postgres === 'connected' ? 'ok' : 'err');
    document.getElementById('status-ollama').className = 'status-dot ' + (h.ollama === 'connected' ? 'ok' : 'err');
  } catch(e) {
    document.getElementById('status-pg').className = 'status-dot err';
    document.getElementById('status-ollama').className = 'status-dot err';
  }
}

// === Tabs ===
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab + '-panel').classList.add('active');
    if (t.dataset.tab === 'graph') loadGraph();
    if (t.dataset.tab === 'nodes') loadNodes();
    if (t.dataset.tab === 'snapshot') loadSnapshot();
  });
});

// === Graph Visualization ===
let graphNodes = [], graphEdges = [];
let canvas, ctx, transform = { x: 0, y: 0, scale: 1 };
let dragging = null, panning = false, panStart = { x: 0, y: 0 };
let hoveredNode = null;

function initCanvas() {
  canvas = document.getElementById('graph-canvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel);
  canvas.addEventListener('dblclick', onDblClick);
}

function resizeCanvas() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  canvas.style.width = r.width + 'px';
  canvas.style.height = r.height + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  drawGraph();
}

async function loadGraph() {
  try {
    const [nodesRes, edgesRes] = await Promise.all([
      fetch(API + '/nodes?limit=200'),
      fetch(API + '/edges?type=contains')
    ]);
    allNodes = await nodesRes.json();
    allEdges = await edgesRes.json();

    // Also fetch all edge types
    const types = ['relates_to','depends_on','decided_by','participated_in','supports','contradicts','mentions'];
    for (const t of types) {
      try {
        const r = await fetch(API + '/edges?type=' + t);
        const e = await r.json();
        if (Array.isArray(e)) allEdges = allEdges.concat(e);
      } catch(ex) {}
    }

    document.getElementById('node-count').textContent = allNodes.length + ' nodes';

    // Build graph data with force layout
    graphNodes = allNodes.map((n, i) => ({
      id: n.id, label: n.label, type: n.node_type, ns: n.namespace,
      summary: n.summary || n.content?.substring(0, 100) || '',
      importance: n.importance,
      x: 200 + Math.cos(i * 2.399) * (150 + Math.random() * 200),
      y: 200 + Math.sin(i * 2.399) * (150 + Math.random() * 200),
      vx: 0, vy: 0
    }));

    graphEdges = allEdges.map(e => ({
      source: graphNodes.findIndex(n => n.id === e.source_id),
      target: graphNodes.findIndex(n => n.id === e.target_id),
      type: e.edge_type
    })).filter(e => e.source >= 0 && e.target >= 0);

    // Run force simulation
    simulateForce(200);
    resetZoom();
    drawGraph();
  } catch(e) {
    console.error('Failed to load graph:', e);
  }
}

function simulateForce(iterations) {
  const nodes = graphNodes;
  const edges = graphEdges;
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;

  for (let iter = 0; iter < iterations; iter++) {
    const alpha = 1 - iter / iterations;

    // Repulsion between all nodes
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = 5000 / (dist * dist);
        let fx = (dx / dist) * force * alpha;
        let fy = (dy / dist) * force * alpha;
        nodes[i].x -= fx; nodes[i].y -= fy;
        nodes[j].x += fx; nodes[j].y += fy;
      }
    }

    // Attraction along edges
    for (const e of edges) {
      let dx = nodes[e.target].x - nodes[e.source].x;
      let dy = nodes[e.target].y - nodes[e.source].y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = (dist - 120) * 0.01 * alpha;
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      nodes[e.source].x += fx; nodes[e.source].y += fy;
      nodes[e.target].x -= fx; nodes[e.target].y -= fy;
    }

    // Center gravity
    for (const n of nodes) {
      n.x += (w / 2 - n.x) * 0.01 * alpha;
      n.y += (h / 2 - n.y) * 0.01 * alpha;
    }
  }
}

function drawGraph() {
  if (!ctx) return;
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.scale, transform.scale);

  // Draw edges
  for (const e of graphEdges) {
    const s = graphNodes[e.source];
    const t = graphNodes[e.target];
    if (!s || !t) continue;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = e.type === 'contradicts' ? '#f8514966' :
                      e.type === 'supports' ? '#3fb95066' :
                      e.type === 'depends_on' ? '#d2992266' : '#30363d88';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Arrow
    const angle = Math.atan2(t.y - s.y, t.x - s.x);
    const mx = (s.x + t.x) / 2;
    const my = (s.y + t.y) / 2;
    ctx.beginPath();
    ctx.moveTo(mx + 5 * Math.cos(angle - 0.5), my + 5 * Math.sin(angle - 0.5));
    ctx.lineTo(mx, my);
    ctx.lineTo(mx + 5 * Math.cos(angle + 0.5), my + 5 * Math.sin(angle + 0.5));
    ctx.strokeStyle = '#30363d88';
    ctx.stroke();
  }

  // Draw nodes
  for (const n of graphNodes) {
    const r = 6 + (n.importance || 0.5) * 8;
    const isHovered = hoveredNode === n;

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = nodeColor(n.type) + (isHovered ? 'ff' : 'cc');
    ctx.fill();

    if (isHovered || transform.scale > 0.8) {
      ctx.strokeStyle = nodeColor(n.type);
      ctx.lineWidth = isHovered ? 2 : 0.5;
      ctx.stroke();
    }

    // Label
    if (transform.scale > 0.5 || isHovered) {
      ctx.font = (isHovered ? 'bold ' : '') + '11px -apple-system, sans-serif';
      ctx.fillStyle = '#e6edf3';
      ctx.textAlign = 'center';
      ctx.fillText(n.label.length > 25 ? n.label.substring(0, 22) + '...' : n.label, n.x, n.y + r + 14);
    }
  }

  ctx.restore();
}

function nodeColor(type) {
  const colors = {
    project: '#58a6ff', decision: '#bc8cff', fact: '#3fb950',
    preference: '#f0883e', problem: '#f85149', advice: '#d29922',
    person: '#79c0ff', topic: '#8b949e', event: '#56d364',
    concept: '#d2a8ff', agent: '#7ee787'
  };
  return colors[type] || '#8b949e';
}

function getNodeAt(mx, my) {
  const x = (mx - transform.x) / transform.scale;
  const y = (my - transform.y) / transform.scale;
  for (let i = graphNodes.length - 1; i >= 0; i--) {
    const n = graphNodes[i];
    const r = 6 + (n.importance || 0.5) * 8;
    if ((x - n.x) ** 2 + (y - n.y) ** 2 < (r + 4) ** 2) return n;
  }
  return null;
}

function onMouseDown(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const node = getNodeAt(mx, my);
  if (node) {
    dragging = node;
  } else {
    panning = true;
    panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
  }
}

function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (dragging) {
    dragging.x = (mx - transform.x) / transform.scale;
    dragging.y = (my - transform.y) / transform.scale;
    drawGraph();
  } else if (panning) {
    transform.x = e.clientX - panStart.x;
    transform.y = e.clientY - panStart.y;
    drawGraph();
  } else {
    const node = getNodeAt(mx, my);
    if (node !== hoveredNode) {
      hoveredNode = node;
      canvas.style.cursor = node ? 'pointer' : 'default';
      showGraphInfo(node);
      drawGraph();
    }
  }
}

function onMouseUp() { dragging = null; panning = false; }

function onWheel(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  transform.scale = Math.max(0.1, Math.min(5, transform.scale * factor));
  transform.x = mx - (mx - transform.x) * factor;
  transform.y = my - (my - transform.y) * factor;
  drawGraph();
}

function onDblClick(e) {
  const rect = canvas.getBoundingClientRect();
  const node = getNodeAt(e.clientX - rect.left, e.clientY - rect.top);
  if (node) selectNodeById(node.id);
}

function resetZoom() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  if (graphNodes.length === 0) { transform = { x: 0, y: 0, scale: 1 }; drawGraph(); return; }
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of graphNodes) {
    minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
  }
  const gw = maxX - minX + 100, gh = maxY - minY + 100;
  transform.scale = Math.min(w / gw, h / gh, 2);
  transform.x = (w - gw * transform.scale) / 2 - minX * transform.scale + 50 * transform.scale;
  transform.y = (h - gh * transform.scale) / 2 - minY * transform.scale + 50 * transform.scale;
  drawGraph();
}

function showGraphInfo(node) {
  const el = document.getElementById('graph-info');
  if (!node) { el.classList.remove('visible'); return; }
  el.classList.add('visible');
  document.getElementById('info-label').textContent = node.label;
  const typeEl = document.getElementById('info-type');
  typeEl.textContent = node.type;
  typeEl.className = 'tag tag-' + (node.type || 'default');
  document.getElementById('info-ns').textContent = node.ns;
  document.getElementById('info-summary').textContent = node.summary || '';

  // Show neighbors
  const neighbors = graphEdges
    .filter(e => graphNodes[e.source] === node || graphNodes[e.target] === node)
    .map(e => {
      const other = graphNodes[e.source] === node ? graphNodes[e.target] : graphNodes[e.source];
      return e.type + ': ' + other.label;
    });
  document.getElementById('info-neighbors').textContent = neighbors.length ? neighbors.join(' | ') : 'No connections';
}

// === Nodes Panel ===
async function loadNodes() {
  try {
    const r = await fetch(API + '/nodes?limit=200');
    allNodes = await r.json();
    renderNodes(allNodes);
  } catch(e) { console.error(e); }
}

function renderNodes(nodes) {
  const container = document.getElementById('nodes-scroll');
  container.innerHTML = nodes.map(n => `
    <div class="node-card${selectedNode?.id === n.id ? ' selected' : ''}" onclick="selectNode('${n.id}')">
      <div class="label">${esc(n.label)}</div>
      <div class="meta">
        <span class="tag tag-${n.node_type}">${n.node_type}</span>
        <span>${n.namespace}</span>
        ${n.access_count ? '<span>· accessed ' + n.access_count + 'x</span>' : ''}
      </div>
    </div>
  `).join('');
}

function filterNodes() {
  const q = document.getElementById('node-search').value.toLowerCase();
  const type = document.getElementById('node-type-filter').value;
  const filtered = allNodes.filter(n => {
    if (type && n.node_type !== type) return false;
    if (q && !n.label.toLowerCase().includes(q) && !(n.content || '').toLowerCase().includes(q)) return false;
    return true;
  });
  renderNodes(filtered);
}

async function selectNode(id) {
  try {
    const [nodeRes, neighborsRes] = await Promise.all([
      fetch(API + '/nodes/' + id),
      fetch(API + '/nodes/' + id + '/neighbors')
    ]);
    selectedNode = await nodeRes.json();
    const neighbors = await neighborsRes.json();
    renderNodes(allNodes);
    renderNodeDetail(selectedNode, neighbors);
  } catch(e) { console.error(e); }
}

function selectNodeById(id) {
  document.querySelector('.tab[data-tab="nodes"]').click();
  setTimeout(() => selectNode(id), 100);
}

function renderNodeDetail(node, neighbors) {
  const el = document.getElementById('node-detail');
  el.innerHTML = `
    <h2>${esc(node.label)}</h2>
    <div class="field"><div class="field-label">Type</div><div class="field-value"><span class="tag tag-${node.node_type}">${node.node_type}</span></div></div>
    <div class="field"><div class="field-label">Namespace</div><div class="field-value">${esc(node.namespace)}</div></div>
    <div class="field"><div class="field-label">Summary</div><div class="field-value">${esc(node.summary || '—')}</div></div>
    <div class="field"><div class="field-label">Content</div><pre>${esc(node.content || '—')}</pre></div>
    <div class="field"><div class="field-label">Version</div><div class="field-value">v${node.version} · valid from ${new Date(node.valid_from).toLocaleString()}${node.valid_to ? ' · expired ' + new Date(node.valid_to).toLocaleString() : ' · current'}</div></div>
    <div class="field"><div class="field-label">Stats</div><div class="field-value">accessed ${node.access_count}x · importance ${node.importance}</div></div>
    <div class="field"><div class="field-label">ID</div><div class="field-value" style="font-family:monospace;font-size:12px">${node.id}</div></div>
    ${neighbors.length ? '<div class="neighbors-list"><div class="field-label">Connections (' + neighbors.length + ')</div>' +
      neighbors.map(n => `<div class="neighbor" onclick="selectNode('${n.id}')">
        <span class="tag tag-${n.node_type}" style="font-size:10px">${n.node_type}</span>
        ${esc(n.label)} <span style="color:var(--text-dim)">(${n.edge_type}, depth ${n.depth})</span>
      </div>`).join('') + '</div>' : ''}
  `;
}

// === Search ===
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const mode = document.getElementById('search-mode').value;
  const container = document.getElementById('search-results');
  container.innerHTML = '<p style="color:var(--text-dim)">Searching...</p>';

  try {
    let results;
    if (mode === 'fts') {
      const r = await fetch(API + '/search?q=' + encodeURIComponent(q));
      results = await r.json();
    } else if (mode === 'semantic') {
      const r = await fetch(API + '/search/semantic', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ query: q })
      });
      results = await r.json();
    } else {
      const r = await fetch(API + '/search/hybrid', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ query: q })
      });
      results = await r.json();
    }

    if (!results || results.length === 0) {
      container.innerHTML = '<p style="color:var(--text-dim)">No results found.</p>';
      return;
    }

    container.innerHTML = results.map(r => `
      <div class="search-result" onclick="selectNodeById('${r.node_id}')">
        <div class="label"><span class="tag tag-${r.node_type}">${r.node_type}</span> ${esc(r.label)}</div>
        <div class="content">${esc((r.content || '').substring(0, 200))}</div>
        <div class="scores">
          ${r.fts_score ? 'FTS: ' + r.fts_score.toFixed(3) + ' ' : ''}
          ${r.vec_score ? 'Vec: ' + r.vec_score.toFixed(3) + ' ' : ''}
          ${r.rrf_score ? 'RRF: ' + r.rrf_score.toFixed(4) : ''}
        </div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = '<p style="color:var(--red)">Search failed: ' + e.message + '</p>';
  }
}

// === Snapshot ===
async function loadSnapshot() {
  try {
    const r = await fetch(API + '/snapshot');
    const data = await r.json();
    document.getElementById('snapshot-content').textContent = data.content || 'No snapshot available.';
  } catch(e) {
    document.getElementById('snapshot-content').textContent = 'Failed to load snapshot.';
  }
}

async function rebuildSnapshot() {
  document.getElementById('snapshot-content').textContent = 'Rebuilding...';
  try {
    const r = await fetch(API + '/snapshot/rebuild', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({})
    });
    const data = await r.json();
    document.getElementById('snapshot-content').textContent = data.content;
  } catch(e) {
    document.getElementById('snapshot-content').textContent = 'Rebuild failed.';
  }
}

// === Create Node Modal ===
function openCreateNode() { document.getElementById('create-modal').classList.add('visible'); }
function closeCreateNode() { document.getElementById('create-modal').classList.remove('visible'); }

async function createNode() {
  const data = {
    label: document.getElementById('new-label').value.trim(),
    node_type: document.getElementById('new-type').value,
    namespace: document.getElementById('new-ns').value.trim() || 'global',
    summary: document.getElementById('new-summary').value.trim(),
    content: document.getElementById('new-content').value.trim()
  };
  if (!data.label) return alert('Label is required');

  try {
    await fetch(API + '/nodes', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    closeCreateNode();
    document.getElementById('new-label').value = '';
    document.getElementById('new-summary').value = '';
    document.getElementById('new-content').value = '';
    loadGraph();
  } catch(e) { alert('Failed to create node'); }
}

// === Utils ===
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// === Init ===
initCanvas();
checkHealth();
loadGraph();
setInterval(checkHealth, 30000);
</script>
